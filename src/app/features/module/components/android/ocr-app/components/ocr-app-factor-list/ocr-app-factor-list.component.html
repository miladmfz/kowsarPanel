<div class="card">
  <div class="card-body">
    <h4 class="card-title">{{ title() }}</h4>
    <div class="row mb-2">
      <div class="col-sm-12">


        <form [formGroup]="EditForm_ocr" id="submitForm">
          <div class="row col-md-12">


            <div class="form-group col-md-9">
              <label for="Searchtarget" class="col-form-label">جستجو </label>
              <input type="text" placeholder="جستجو..." class="form-control" id="Searchtarget"
                formControlName="Searchtarget" maxlength="100" autocomplete="off" (ngModelChange)="onInputChange()" />
            </div>


            <div class="form-group col-md-3">
              <label for="SourceFlag" class="col-form-label">دیتابیس مورد نظر </label>
              <select formControlName="SourceFlag" id="SourceFlag" class="form-control custom-select"
                data-toggle="select2" (ngModelChange)="onInputChange()">
                @for (item of SourceFlag_lookup; track item) {
                <option [value]="item.id">{{
                  item.name }}</option>
                }
              </select>

            </div>



          </div>
        </form>




        <a type="button" class="btn btn-light waves-effect waves-light m-1" (click)="getList()">
          <span class="btn-label"><i class="fas fa-sync me-1"></i></span>بازخوانی
        </a>

      </div>


    </div>


    <div class="ag-container rounded-3 border shadow-sm overflow-hidden" style="height: 600px;">
      <ag-grid-angular [enableBrowserTooltips]="true" [tooltipShowDelay]="200" [tooltipHideDelay]="800"
        [columnDefs]="column_name_1" [rowData]="records()" [gridOptions]="gridOptions"
        (gridReady)="onGridReady($event, 1)" (firstDataRendered)="gridApi1?.sizeColumnsToFit()"
        [class]="themeClass + ' w-100 h-100'"></ag-grid-angular>
    </div>


  </div>
</div>
