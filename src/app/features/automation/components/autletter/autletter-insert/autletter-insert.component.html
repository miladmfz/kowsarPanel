<!--   عنوان صفحه -->
<div class="row mb-3">
  <div class="col-12">
    <div class="page-title-box">
      <h4 class="page-title">ایجاد تیکت جدید</h4>
    </div>
  </div>
</div>

<!--   فرم ثبت تیکت -->
<form [formGroup]="EditForm_LetterInsert" (ngSubmit)="submit('')" id="submitForm">
  <div class="card">
    <div class="card-body row g-3">




      <div class="col-md-2">
        <label class="form-label">تاریخ</label> <input id="LetterDate" type="text" class="form-control"
          placeholder="نمایش مشتریان" formControlName="LetterDate" readonly autocomplete="off" [readOnly]="true" />

      </div>

      <!--   عنوان تیکت -->
      <div class="col-md-3">
        <label class="form-label">عنوان تیکت <span class="text-danger">*</span></label>
        <label class="form-label text-info">(انتخابی)</label>
        <select id="title" formControlName="title" class="form-control custom-select"
          [class.is-invalid]="EditForm_LetterInsert.controls['title'].invalid && EditForm_LetterInsert.controls['title'].touched"
          [class.is-valid]="EditForm_LetterInsert.controls['title'].valid && EditForm_LetterInsert.controls['title'].touched">
          <option value="">لطفاً انتخاب کنید</option>
          @for (item of Title_Lookup; track item) {
          <option [value]="item.id">{{ item.name }}</option>
          }
        </select>
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
            validation: 'required',
            message: 'اجباری است',
            control: EditForm_LetterInsert.controls['title']
          }"></ng-container>
      </div>

      <!--   انتخاب مشتری (در صورت کارمند بودن) -->
      @if (IsEmploy()) {
      <div class="col-md-2">
        <label class="form-label">کد مشتری <span class="text-danger">*</span></label>
        <label class="form-label text-info">(انتخابی)</label>
        <input id="OwnerCentral" type="text" class="form-control" placeholder="نمایش مشتریان"
          formControlName="OwnerCentral" readonly autocomplete="off" (click)="GetCentral()"
          [class.is-invalid]="EditForm_LetterInsert.controls['OwnerCentral'].invalid && EditForm_LetterInsert.controls['OwnerCentral'].touched"
          [class.is-valid]="EditForm_LetterInsert.controls['OwnerCentral'].valid && EditForm_LetterInsert.controls['OwnerCentral'].touched" />
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
              validation: 'required',
              message: 'اجباری است',
              control: EditForm_LetterInsert.controls['OwnerCentral']
            }"></ng-container>
      </div>
      }

      <!-- 👤 نام مشتری -->
      <div class="col-md-3">
        <label class="form-label">نام مشتری</label>
        <input id="OwnerName" type="text" formControlName="OwnerName" class="form-control" readonly />
      </div>



      @if (!IsEmploy()) {
      <div class="col-md-2">
        <label class="form-label">محرمانگی</label>
        <select id="IsPrivate" formControlName="IsPrivate" class="form-control custom-select">
          <option value="">لطفاً انتخاب کنید</option>
          @for (item of IsPrivate_Lookup; track item) {
          <option [value]="item.id">{{ item.name }}</option>
          }
        </select>

      </div>
      }

      <!--   اولویت و نوع نامه -->
      @if (IsEmploy()) {
      <div class="col-md-2">
        <label class="form-label">اولویت</label>
        <select id="LetterPriority" formControlName="LetterPriority" class="form-control custom-select"
          [class.is-invalid]="EditForm_LetterInsert.controls['LetterPriority'].invalid && EditForm_LetterInsert.controls['LetterPriority'].touched"
          [class.is-valid]="EditForm_LetterInsert.controls['LetterPriority'].valid && EditForm_LetterInsert.controls['LetterPriority'].touched">
          <option value="">لطفاً انتخاب کنید</option>
          @for (item of LetterPriority_lookup; track item) {
          <option [value]="item.aType">{{ item.aType }}</option>
          }
        </select>
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
            validation: 'required',
            message: 'اجباری است',
            control: EditForm_LetterInsert.controls['LetterPriority']
          }"></ng-container>
      </div>

      <div class="col-md-2">
        <label class="form-label">نوع نامه</label>
        <select id="InOutFlag" formControlName="InOutFlag" class="form-control custom-select"
          [class.is-invalid]="EditForm_LetterInsert.controls['InOutFlag'].invalid && EditForm_LetterInsert.controls['InOutFlag'].touched"
          [class.is-valid]="EditForm_LetterInsert.controls['InOutFlag'].valid && EditForm_LetterInsert.controls['InOutFlag'].touched">
          <option value="">لطفاً انتخاب کنید</option>
          @for (item of InOut_Lookup; track item) {
          <option [value]="item.id">{{ item.name }}</option>
          }
        </select>
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
            validation: 'required',
            message: 'اجباری است',
            control: EditForm_LetterInsert.controls['InOutFlag']
          }"></ng-container>
      </div>
      }

      <!--   شرح تیکت -->
      <div class="col-md-12">
        <label class="form-label">شرح تیکت <span class="text-danger">*</span></label>
        <textarea id="Description" formControlName="Description" class="form-control" rows="4" autocomplete="off"
          [class.is-invalid]="EditForm_LetterInsert.controls['Description'].invalid && EditForm_LetterInsert.controls['Description'].touched"
          [class.is-valid]="EditForm_LetterInsert.controls['Description'].valid && EditForm_LetterInsert.controls['Description'].touched"></textarea>
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
            validation: 'required',
            message: 'اجباری است',
            control: EditForm_LetterInsert.controls['Description']
          }"></ng-container>
      </div>
    </div>
  </div>
</form>

<!--   دکمه‌های ثبت -->
<div class="card mt-3">
  <div class="card-body">
    <a class="btn btn-success m-2" (click)="submit('')">
      <i class="fas fa-check-double me-1"></i> ارسال تیکت
    </a>
    @if (LoginType() === 'KOWSAR') {
    <a class="btn btn-primary m-2" (click)="submit('detail')">
      <i class="fas fa-check-double me-1"></i> ثبت و ارجاع تیکت
    </a>
    }
  </div>
</div>

<!--   Modal: لیست مشتریان -->
<div class="modal fade" #centrallist tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content bg-light">
      <div class="modal-header bg-secondary text-white">
        <h5 class="modal-title">لیست مشتریان</h5>
        <button type="button" class="btn-close btn-close-white" (click)="centrallist_dialog_close()"></button>
      </div>

      <div class="modal-body">
        <!--   جستجو -->
        <div class="mb-3">
          <input type="text" class="form-control" placeholder="جستجو..." [(ngModel)]="Searchtarget_central"
            (ngModelChange)="onInputChange_Customer()" [ngModelOptions]="{ standalone: true }" />
        </div>

        <!--   وضعیت بارگذاری -->
        @if (loading()) {
        <div class="text-center my-3">
          <div class="spinner-border" role="status">
            <span class="visually-hidden">در حال بارگذاری...</span>
          </div>
        </div>
        }

        <!--   جدول مشتریان -->
        <div class="ag-container" style="height: 600px; border-radius: 4px; overflow: hidden;">
          <ag-grid-angular [enableBrowserTooltips]="true" [tooltipShowDelay]="200" [tooltipHideDelay]="800"
            [columnDefs]="column_name_1" [rowData]="records_support_central()" (gridReady)="onGridReady($event, 1)"
            [gridOptions]="gridOptions" [class]="themeClass + ' w-100 h-100'"
            [rowSelection]="{ mode: 'singleRow' ,enableClickSelection: true}"
            (firstDataRendered)="gridApi1?.sizeColumnsToFit()" (selectionChanged)="onSelectionChanged($event)">
          </ag-grid-angular>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="centrallist_dialog_close()">بستن</button>
        <button class="btn btn-primary" (click)="Set_Customer()">انتخاب</button>
      </div>
    </div>
  </div>
</div>

<!--   قالب خطا -->
<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  @if (control.hasError(validation) && (control.dirty || control.touched)) {
  <div class="fv-plugins-message-container invalid-feedback">
    <span role="alert">{{ message }}</span>
  </div>
  }
</ng-template>
