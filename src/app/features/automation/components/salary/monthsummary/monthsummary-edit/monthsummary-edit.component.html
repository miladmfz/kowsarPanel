<div class="row mb-3">
  <div class="col-12">
    <div class="page-title-box d-flex justify-content-between align-items-center">
      <h4 class="page-title text-primary fw-semibold">
        {{ title() }}
      </h4>
    </div>
  </div>
</div>

<form [formGroup]="EditForm_MonthSummary" (ngSubmit)="submit('')" id="submitForm">

  <div class="card shadow-sm border-0">
    <div class="card-body row g-3">



      <div class="form-group col-md-3">
        <label class="form-label fw-semibold">سال</label>
        <select id="Sal" class="form-control" formControlName="Sal" [ngClass]="{
                   'is-invalid': EditForm_MonthSummary.controls['Sal'].invalid && EditForm_MonthSummary.controls['Sal'].touched,
                   'is-valid': EditForm_MonthSummary.controls['Sal'].valid && EditForm_MonthSummary.controls['Sal'].touched
                 }">
          <option value="">لطفاً انتخاب کنید</option>
          @for (item of Sal_Lookup; track item) {
          <option [value]="item.id">{{ item.name }}</option>
          }
        </select>
      </div>



      <div class="form-group col-md-3">
        <label class="form-label fw-semibold">ماه</label>
        <select id="Mah" class="form-control" formControlName="Mah" [ngClass]="{
                   'is-invalid': EditForm_MonthSummary.controls['Mah'].invalid && EditForm_MonthSummary.controls['Mah'].touched,
                   'is-valid': EditForm_MonthSummary.controls['Mah'].valid && EditForm_MonthSummary.controls['Mah'].touched
                 }">
          <option value="">لطفاً انتخاب کنید</option>
          @for (item of Mah_Lookup; track item) {
          <option [value]="item.id">{{ item.name }}</option>
          }
        </select>
      </div>




      <!-- Activation Code -->
      <div class="form-group col-md-3">
        <label class="form-label fw-semibold">تعداد کل روز</label>
        <input type="text" formControlName="TotalDays" class="form-control" [ngClass]="{
                              'is-invalid':
                              EditForm_MonthSummary.controls['TotalDays'].invalid &&
                              EditForm_MonthSummary.controls['TotalDays'].touched,
                              'is-valid':
                              EditForm_MonthSummary.controls['TotalDays'].valid &&
                              EditForm_MonthSummary.controls['TotalDays'].touched
                            }" />
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                              validation: 'required',
                              message: 'اجباری است',
                              control: EditForm_MonthSummary.controls['TotalDays']
                            }"></ng-container>
      </div>

      <div class="form-group col-md-3">
        <label class="form-label fw-semibold">تعداد روز تعطیل</label>
        <input type="text" class="form-control" formControlName="HolidayDays" autocomplete="off" [ngClass]="{
                              'is-invalid':
                              EditForm_MonthSummary.controls['HolidayDays'].invalid &&
                              EditForm_MonthSummary.controls['HolidayDays'].touched,
                              'is-valid':
                              EditForm_MonthSummary.controls['HolidayDays'].valid &&
                              EditForm_MonthSummary.controls['HolidayDays'].touched
                            }" />
        <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                              validation: 'required',
                              message: 'اجباری است',
                              control: EditForm_MonthSummary.controls['HolidayDays']
                            }"></ng-container>
      </div>

      <div class="form-group col-md-12">
        <label class="form-label fw-semibold">توضیحات</label>
        <input type="text" class="form-control" formControlName="Explain" autocomplete="off">
      </div>



    </div>
  </div>
</form>

<div class="card shadow-sm border-0 mt-3">
  <div class="card-body d-flex gap-2">

    <button class="btn btn-success px-4" type="button" (click)="submit('exit')">
      <i class="fas fa-check-double me-1"></i>
      ذخیره
    </button>

    <button class="btn btn-light px-4" type="button" (click)="onBtnCancelClick()">
      <i class="fas fa-times me-1"></i>
      انصراف
    </button>

  </div>
</div>

<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  @if (control.hasError(validation) && (control.dirty || control.touched)) {
  <div class="invalid-feedback d-block">
    {{ message }}
  </div>
  }
</ng-template>
