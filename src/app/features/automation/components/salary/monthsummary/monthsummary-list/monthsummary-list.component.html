<div class="card">
  <div class="card-body">


    <form [formGroup]="EditForm_SearchTarget" id="submitForm">

      <div class="card shadow-sm border-0">
        <div class="card-body row g-3">



          <div class="form-group col-md-3">
            <label class="form-label fw-semibold">سال</label>
            <select id="Sal" class="form-control" formControlName="Sal" [ngClass]="{
                   'is-invalid': EditForm_SearchTarget.controls['Sal'].invalid && EditForm_SearchTarget.controls['Sal'].touched,
                   'is-valid': EditForm_SearchTarget.controls['Sal'].valid && EditForm_SearchTarget.controls['Sal'].touched
                 }">
              <option value="">لطفاً انتخاب کنید</option>
              @for (item of Sal_Lookup; track item) {
              <option [value]="item.id">{{ item.name }}</option>
              }
            </select>
          </div>



          <div class="form-group col-md-3">
            <label class="form-label fw-semibold">ماه</label>
            <select id="Mah" class="form-control" formControlName="Mah" [ngClass]="{
                   'is-invalid': EditForm_SearchTarget.controls['Mah'].invalid && EditForm_SearchTarget.controls['Mah'].touched,
                   'is-valid': EditForm_SearchTarget.controls['Mah'].valid && EditForm_SearchTarget.controls['Mah'].touched
                 }">
              <option value="">لطفاً انتخاب کنید</option>
              @for (item of Mah_Lookup; track item) {
              <option [value]="item.id">{{ item.name }}</option>
              }
            </select>
          </div>

          <div class="col-md-6 text-start">
            <button class="btn btn-success me-1" (click)="getList()">
              <i class="fas fa-sync"></i> بازخوانی
            </button>
            <button class="btn btn-success me-1" (click)="NavigateToEdit('0')">
              <i class="fas fa-sync"></i> ماه کاری جدید
            </button>
          </div>



        </div>
      </div>
    </form>


    <!-- گرید اصلی -->
    <div class="ag-container rounded-3 border shadow-sm overflow-hidden" style="height: 600px;">
      <ag-grid-angular [enableBrowserTooltips]="true" [tooltipShowDelay]="200" [tooltipHideDelay]="800"
        [columnDefs]="column_name_1" [rowData]="records()" [gridOptions]="gridOptions"
        (gridReady)="onGridReady($event, 1)" (firstDataRendered)="gridApi1?.sizeColumnsToFit()"
        [class]="themeClass + ' w-100 h-100'">
      </ag-grid-angular>
    </div>
  </div>
</div>
