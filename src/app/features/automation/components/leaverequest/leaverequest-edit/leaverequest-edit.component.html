<!-- ===============================================================
📋 فرم ثبت و ویرایش درخواست مرخصی
شامل انتخاب نوع مرخصی، تاریخ شروع و پایان، توضیحات و پیوست‌ها
=============================================================== -->

<div class="card shadow-sm mt-3">
  <div class="card-body">
    <!--   عنوان -->
    <h4 class="header-title mb-4">{{ title() }}</h4>

    <!-- 🧾 فرم اصلی -->
    <form [formGroup]="EditForm_LeaveRequest" (ngSubmit)="submit()">
      <div class="row g-3">

        <!-- 📅 تاریخ درخواست -->
        <div class="col-md-3">
          <label class="form-label">تاریخ درخواست</label>
          <input formControlName="LeaveRequestDate" class="form-control" readonly />
        </div>

        <!-- 🧭 نوع مرخصی -->
        <div class="col-md-3">
          <label class="form-label">نوع مرخصی</label>
          <select class="form-select" formControlName="LeaveRequestType" (change)="onLeaveTypeChange()"
            [class.is-invalid]="EditForm_LeaveRequest.controls['LeaveRequestType'].invalid && EditForm_LeaveRequest.controls['LeaveRequestType'].touched"
            [class.is-valid]="EditForm_LeaveRequest.controls['LeaveRequestType'].valid && EditForm_LeaveRequest.controls['LeaveRequestType'].touched">
            <option value="">انتخاب کنید</option>
            @for (item of LeaveType_Lookup; track item) {
            <option [value]="item.id">{{ item.name }}</option>
            }
          </select>
        </div>



        <!-- 📆 تاریخ شروع -->
        <div class="col-md-3">
          <label class="form-label">تاریخ شروع</label>
          <ng-persian-datepicker [uiTheme]="customTheme">
            <input class="form-control text-center" formControlName="LeaveStartDate" autocomplete="off"
              [class.is-invalid]="EditForm_LeaveRequest.controls['LeaveStartDate'].invalid && EditForm_LeaveRequest.controls['LeaveStartDate'].touched"
              [class.is-valid]="EditForm_LeaveRequest.controls['LeaveStartDate'].valid && EditForm_LeaveRequest.controls['LeaveStartDate'].touched" />
          </ng-persian-datepicker>
        </div>

        <!-- 📆 تاریخ پایان -->
        <div class="col-md-3">
          <label class="form-label">تاریخ پایان</label>
          <ng-persian-datepicker [uiTheme]="customTheme">
            <input class="form-control text-center" formControlName="LeaveEndDate" autocomplete="off"
              [class.is-invalid]="EditForm_LeaveRequest.controls['LeaveEndDate'].invalid && EditForm_LeaveRequest.controls['LeaveEndDate'].touched"
              [class.is-valid]="EditForm_LeaveRequest.controls['LeaveEndDate'].valid && EditForm_LeaveRequest.controls['LeaveEndDate'].touched" />
          </ng-persian-datepicker>
        </div>

        <!-- ⏰ بازه زمانی (فقط برای مرخصی ساعتی) -->
        @if (showTimeFields()) {
        <!-- <div class="col-md-3">
          <label class="form-label">از ساعت</label>
          <input formControlName="LeaveStartTime" class="form-control" type="time"
            [class.is-invalid]="EditForm_LeaveRequest.controls['LeaveStartTime'].invalid && EditForm_LeaveRequest.controls['LeaveStartTime'].touched"
            [class.is-valid]="EditForm_LeaveRequest.controls['LeaveStartTime'].valid && EditForm_LeaveRequest.controls['LeaveStartTime'].touched" />
        </div> -->


        <div class="col-md-3">
          <label class="form-label">از ساعت</label>

          <select class="form-select" formControlName="LeaveStartTime" (change)="onTimeChange()"
            [class.is-invalid]="EditForm_LeaveRequest.controls['LeaveStartTime'].invalid && EditForm_LeaveRequest.controls['LeaveStartTime'].touched"
            [class.is-valid]="EditForm_LeaveRequest.controls['LeaveStartTime'].valid && EditForm_LeaveRequest.controls['LeaveStartTime'].touched">

            <option value="">انتخاب کنید</option>

            <option *ngFor="let t of timeOptions" [value]="t">
              {{ t }}
            </option>

          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label">تا ساعت</label>

          <select class="form-select" formControlName="LeaveEndTime" (change)="onTimeChange()"
            [class.is-invalid]="EditForm_LeaveRequest.controls['LeaveEndTime'].invalid && EditForm_LeaveRequest.controls['LeaveEndTime'].touched"
            [class.is-valid]="EditForm_LeaveRequest.controls['LeaveEndTime'].valid && EditForm_LeaveRequest.controls['LeaveEndTime'].touched">

            <option value="">انتخاب کنید</option>

            <option *ngFor="let t of timeOptions" [value]="t">
              {{ t }}
            </option>

          </select>
        </div>


        <!-- <div class="col-md-3">
          <label class="form-label">تا ساعت</label>
          <input formControlName="LeaveEndTime" class="form-control" type="time"
            [class.is-invalid]="EditForm_LeaveRequest.controls['LeaveEndTime'].invalid && EditForm_LeaveRequest.controls['LeaveEndTime'].touched"
            [class.is-valid]="EditForm_LeaveRequest.controls['LeaveEndTime'].valid && EditForm_LeaveRequest.controls['LeaveEndTime'].touched" />
        </div> -->
        }
        <!--   توضیحات -->
        <div class="col-md-12">
          <label class="form-label">توضیحات<span class="text-danger">*</span></label>
          <textarea formControlName="LeaveRequestExplain" class="form-control" rows="2"
            [class.is-invalid]="EditForm_LeaveRequest.controls['LeaveRequestExplain'].invalid && EditForm_LeaveRequest.controls['LeaveRequestExplain'].touched"
            [class.is-valid]="EditForm_LeaveRequest.controls['LeaveRequestExplain'].valid && EditForm_LeaveRequest.controls['LeaveRequestExplain'].touched"></textarea>
          <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
            validation: 'required',
            message: 'اجباری است',
            control: EditForm_LeaveRequest.controls['LeaveRequestExplain']
          }"></ng-container>
        </div>
        <!-- 💾 دکمه ذخیره -->
        <div class="col-12 text-end mt-3">
          <button type="submit" class="btn btn-success px-4">
            <i class="fas fa-check-double me-2"></i>
            ذخیره
          </button>
        </div>
      </div>
    </form>
  </div>
</div>

<!-- 📎 نمایش بخش پیوست‌ها در صورت ثبت مرخصی -->
@if (LeaveRequestCode().length > 0) {
<div class="card mt-3 shadow-sm">
  <div class="card-body">
    <app-kowsar-attach [ObjectRef]="LeaveRequestCode()" [ClassName]="'LeaveReq'"></app-kowsar-attach>
  </div>
</div>
}



<!--   قالب خطا -->
<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  @if (control.hasError(validation) && (control.dirty || control.touched)) {
  <div class="fv-plugins-message-container invalid-feedback">
    <span role="alert">{{ message }}</span>
  </div>
  }
</ng-template>
