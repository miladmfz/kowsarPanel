<form [formGroup]="EditForm_Explain" (ngSubmit)="submit('')" id="submitForm">
  <div class="row">
    <div class="col-12">
      <div class="card">
        <div class="card-body row">



          <div class="row col-md-12">


            <div class="form-group col-md-3">
              <label for="GoodCode" class="col-form-label">کد کالا </label>
              <input type="text" class="form-control" id="GoodCode" formControlName="GoodCode" maxlength="100"
                autocomplete="off" [readOnly]="true" />
            </div>
            <!--

                      <div class="form-group col-md-3">
                        <label for="GoodSubCode" class="col-form-label">کد زیر مجموعه </label>
                        <input type="text" class="form-control" id="GoodSubCode" formControlName="GoodSubCode"
                          maxlength="100" autocomplete="off" [readOnly]="true" />
                        </div> -->



          </div>




          <div class="form-group col-md-12">
            <label for="GoodName" class="col-form-label">نام کالا </label>
            <input type="text" class="form-control" id="GoodName" formControlName="GoodName" maxlength="400"
              autocomplete="off" [readOnly]="true" />
          </div>



          <div class="form-group col-md-12">
            <label for="GoodExplain1" class="col-form-label">توضیحات 1</label>
            <input type="text" class="form-control" id="GoodExplain1" formControlName="GoodExplain1" maxlength="200"
              autocomplete="off" />
          </div>

          <div class="form-group col-md-12">
            <label for="GoodExplain2" class="col-form-label">توضیحات 2</label>
            <input type="text" class="form-control" id="GoodExplain2" formControlName="GoodExplain2" maxlength="200"
              autocomplete="off" />
          </div>

          <div class="form-group col-md-12">
            <label for="GoodExplain3" class="col-form-label">توضیحات 3</label>
            <input type="text" class="form-control" id="GoodExplain3" formControlName="GoodExplain3" maxlength="200"
              autocomplete="off" />
          </div>

          <div class="form-group col-md-12">
            <label for="GoodExplain4" class="col-form-label">توضیحات 4</label>
            <input type="text" class="form-control" id="GoodExplain4" formControlName="GoodExplain4" maxlength="200"
              autocomplete="off" />
          </div>

          <div class="form-group col-md-12">
            <label for="GoodExplain5" class="col-form-label">توضیحات 5</label>
            <input type="text" class="form-control" id="GoodExplain5" formControlName="GoodExplain5" maxlength="200"
              autocomplete="off" />
          </div>

          <div class="form-group col-md-12">
            <label for="GoodExplain6" class="col-form-label">توضیحات 6</label>
            <input type="text" class="form-control" id="GoodExplain6" formControlName="GoodExplain6" maxlength="200"
              autocomplete="off" />
          </div>



        </div>
      </div>
    </div>
  </div>
</form>

@if (changedValues_show()) {
<div class="card">
  <div class="card-body">
    <div class="col-sm-12">
      <!-- <a href="javascript:void(0)" type="button" class="btn btn-success waves-effect waves-light mx-1"
                                                        (click)="submit('explain_exit')">
                                                        <span class="btn-label"><i class="fas fa-check-double"></i></span>ذخیره و خروج
                                                      </a> -->
      <a href="javascript:void(0)" type="button" class="btn btn-success waves-effect waves-light mx-1"
        (click)="submit('explain')">
        <span class="btn-label"><i class="fas fa-check"></i></span>ذخیره
      </a>
      <a href="javascript:void(0)" type="button" class="btn btn-light waves-effect waves-light mx-1"
        (click)="changedValues_cansel_explain()">
        <span class="btn-label"><i class="fas fa-times"></i></span>انصراف
      </a>
    </div>
  </div>
</div>
}




<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  @if (control.hasError(validation) && (control.dirty || control.touched)) {
  <div class="fv-plugins-message-container invalid-feedback">
    <span role="alert">
      {{ message }}
    </span>
  </div>
  }
</ng-template>
