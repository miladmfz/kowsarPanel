<div class="card">
  <div class="card-body">
    <h4 class="card-title mb-3">{{ title() }}</h4>

    <form [formGroup]="EditForm_SearchTarget" class="row mb-4 align-items-end">
      <!-- <div class="col-md-3">
        <label class="form-label">جستجو</label>
        <input type="text" class="form-control" formControlName="SearchTarget" placeholder="عبارت مورد نظر..."
          (input)="loadList()" />
      </div> -->

      <!-- <div class="col-md-3">
        <label class="form-label">نمایش تیکت‌ها</label>
        <select class="form-select" formControlName="SelectedOption">
          <option value="0">همه</option>
          <option value="1">خودم</option>
        </select>
      </div> -->

      <div class="row col-md-12">
        <div class="col-md-3">
          <label class="form-label">از تاریخ</label>
          <ng-persian-datepicker [uiTheme]="customTheme" [uiHideOnOutsideClick]="true" [uiHideAfterSelectDate]="true">
            <input type="text" class="form-control text-center" formControlName="FromDate" placeholder="انتخاب تاریخ"
              autocomplete="off" />
          </ng-persian-datepicker>
        </div>

        <div class="col-md-3">
          <label class="form-label">تا تاریخ</label>
          <ng-persian-datepicker [uiTheme]="customTheme" [uiHideOnOutsideClick]="true" [uiHideAfterSelectDate]="true">
            <input type="text" class="form-control text-center" formControlName="ToDate" placeholder="انتخاب تاریخ"
              autocomplete="off" />
          </ng-persian-datepicker>
        </div>
        <div class="col-md-2">
          <label class="form-label">از ساعت</label>
          <input type="text" class="form-control" formControlName="FromTime" readonly />

        </div>

        <div class="col-md-2">
          <label class="form-label">تا ساعت</label>
          <input type="text" class="form-control" formControlName="ToTime" readonly />

        </div>
      </div>


      <div class="col-md-2">
        <label class="form-label">انبار</label>
        <input type="text" class="form-control" formControlName="StackName" placeholder="انبار مورد نظر"
          (click)="AddStack()" readonly />
      </div>

      <div class="col-md-2">
        <label class="form-label">با کد اصلی کالا</label>
        <select class="form-select" formControlName="withGoodMain" (change)="select_withGoodMain()">
          <option value="0">خیر</option>
          <option value="1">بله</option>
        </select>
      </div>

      <div class="col-md-2">
        <label class="form-label">تجمیع</label>
        <select class="form-select" formControlName="withGroupBy" (change)="select_withGroupBy()">
          <option value="0">خیر</option>
          <option value="1">بله</option>
        </select>
      </div>

      @if (GroupBy_show()){

      <div class="col-md-3">
        <label class="form-label">گروه بندی بر اساس <span class="text-danger">*</span></label>
        <label class="form-label text-info">(انتخابی)</label>
        <select id="GroupByField" formControlName="GroupByField" class="form-control custom-select">
          <option value="">لطفاً انتخاب کنید</option>
          @for (item of records_GridSchema(); track item) {
          <option [value]="item.FieldName">{{ item.Caption }}</option>
          }
        </select>

      </div>



      }


      <div class="col-12 d-flex justify-content-end mt-3 gap-2">

        <button type="button" class="btn btn-primary" (click)="togget_report_view()">
          <i class="fas fa-search me-1"></i> {{lable_report_view()}}
        </button>

        <button type="button" class="btn btn-primary" (click)="loadList()">
          <i class="fas fa-search me-1"></i> جستجو
        </button>


        <button type="button" class="btn btn-light" (click)="loadList()">
          <i class="fas fa-sync me-1"></i> بازخوانی
        </button>

        <button type="button" class="btn btn-outline-secondary" (click)="clearFilter()">
          <i class="fas fa-eye-slash me-1"></i> حذف جستجو
        </button>
      </div>
    </form>


    @if (show_report_list()){

    <div class="ag-container rounded-3 border shadow-sm overflow-hidden" style="height: 600px;">
      <ag-grid-angular [enableBrowserTooltips]="true" [tooltipShowDelay]="200" [tooltipHideDelay]="800"
        [columnDefs]="column_name_1" [rowData]="records()" [gridOptions]="gridOptions"
        (gridReady)="onGridReady($event, 1)" (firstDataRendered)="gridApi1?.sizeColumnsToFit()"
        (sortChanged)="onSortChanged(1)" [class]="themeClass + ' w-100 h-100'"></ag-grid-angular>
    </div>

    } @else{

    <app-kowsar-chart-column [title]="'نوع کالا'" [series]="columnChartData()"
      [categories]="columnChartCategories()"></app-kowsar-chart-column>


    <!-- <app-kowsar-chart-column [title]="'column'" [series]="columnChartData"
      [categories]="columnChartCategories"></app-kowsar-chart-column>


    <app-kowsar-chart-line [title]="'line'" [series]="columnChartData"
      [categories]="columnChartCategories"></app-kowsar-chart-line>


    <app-kowsar-chart-area [title]="'area'" [series]="columnChartData"
      [categories]="columnChartCategories"></app-kowsar-chart-area>


    <app-kowsar-chart-bar [title]="'bar'" [series]="columnChartData"
      [categories]="columnChartCategories"></app-kowsar-chart-bar>


    <app-kowsar-chart-donut [title]="'donut'" [series]="columnChartData"
      [categories]="columnChartCategories"></app-kowsar-chart-donut>


    <app-kowsar-chart-pie [title]="'pie'" [series]="columnChartData"
      [categories]="columnChartCategories"></app-kowsar-chart-pie> -->


    }






  </div>
</div>



<div class="modal fade" id="stacklist" tabindex="-1" aria-labelledby="stacklistLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class=" modal-title" id="stacklistLabel">لیست انبار ها</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"
          (click)="stack_dialog_close()"></button>
      </div>
      <div class="modal-body">


        <div class="ag-container rounded-3 border shadow-sm overflow-hidden" style="height: 600px;">
          <ag-grid-angular [enableBrowserTooltips]="true" [tooltipShowDelay]="200" [tooltipHideDelay]="800"
            [columnDefs]="columnDefs5" [rowData]="records_Stack()" [gridOptions]="gridOptions"
            (gridReady)="onGridReady($event, 5)" (firstDataRendered)="gridApi5?.sizeColumnsToFit()"
            [class]="themeClass + ' w-100 h-100'" [rowSelection]="{ mode: 'singleRow' ,enableClickSelection: true}"
            (selectionChanged)="onSelectionChanged($event)" [treeData]="true" [getDataPath]="getDataPath_stack">
          </ag-grid-angular>
        </div>




      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
          (click)="stack_dialog_close()">بستن</button>
        <button type="button" class="btn btn-primary" (click)="SetStack()">انتخاب</button>
      </div>
    </div>
  </div>
</div>
