<div class="card">
  <div class="card-body">

    <h4 class="card-title">{{ title() }}</h4>

    <div class="row mb-2">
      <div class="col-sm-12">

        <!-- جدید -->
        <a type="button" class="btn btn-success waves-effect waves-light m-1"
          [routerLink]="['/internal/internal-apps-edit', 0]">
          <span class="btn-label"><i class="fas fa-plus"></i></span>
          جدید
        </a>


        <!-- بازخوانی -->
        <button type="button" class="btn btn-light waves-effect waves-light m-1" (click)="getList()">
          <span class="btn-label"><i class="fas fa-sync me-1"></i></span>
          بازخوانی
        </button>




      </div>
    </div>

    <!-- لودر -->
    @if (loading()) {
    <div class="text-center">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Loading...</span>
      </div>
    </div>
    }

    <!-- گرید -->
    <div class="ag-container rounded-3 border shadow-sm overflow-hidden" style="height: 600px;">
      <ag-grid-angular [enableBrowserTooltips]="true" [tooltipShowDelay]="200" [tooltipHideDelay]="800"
        [columnDefs]="column_name_1" [rowData]="records()" [gridOptions]="gridOptions"
        (gridReady)="onGridReady($event, 1)" (firstDataRendered)="gridApi1?.sizeColumnsToFit()"
        [class]="themeClass + ' w-100 h-100'">
      </ag-grid-angular>
    </div>

  </div>
</div>
