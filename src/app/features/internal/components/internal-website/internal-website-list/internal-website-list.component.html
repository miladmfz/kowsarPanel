<div class="card shadow-sm">
  <div class="card-body">

    <form [formGroup]="EditForm">
      <h4 class="card-title mb-3">{{ title }}</h4>

      <div class="row align-items-center mb-3">
        <div class="col-md-4 mb-2 mb-md-0">
          <input type="text" class="form-control rounded-pill" placeholder="جستجو..." formControlName="SearchTarget"
            (input)="onSearchChange()" />
        </div>

        <div class="col-md-8 text-start">
          <button class="btn btn-success me-1 mb-1" [routerLink]="['/internal/internal-website-edit', 0]">
            <i class="fas fa-plus me-1"></i>
            جدید
          </button>
        </div>
      </div>

    </form>

    <div class="ag-container rounded-3 overflow-hidden" style="height: 600px;">
      <ag-grid-angular [columnDefs]="columnDefs1" [rowData]="records" [gridOptions]="gridOptions"
        (gridReady)="onGridReady($event, 1)" (firstDataRendered)="gridApi1?.sizeColumnsToFit()" class="w-100 h-100">
      </ag-grid-angular>
    </div>

  </div>
</div>
