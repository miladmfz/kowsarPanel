<div class="card-body">
  <div class="tab-content">
    <div class="tab-pane fade show active" role="tabpanel">

      <div class="card">
        <div class="card-body">

          <form [formGroup]="EditForm">
            <h4 class="card-title mb-3">{{ title() }}</h4>

            <div class="row align-items-center mb-3">
              <div class="col-md-10 mb-2 mb-md-0">
                <input type="text" class="form-control rounded-pill" placeholder="جستجو..."
                  formControlName="SearchTarget" (input)="onSearchChange()" />
              </div>

              <div class="col-md-2 text-start">
                <button class="btn btn-success me-1 mb-1" [routerLink]="['/internal/internal-website-edit', 0]">
                  <i class="fas fa-plus me-1"></i>
                  جدید
                </button>
              </div>
            </div>

          </form>


        </div>



      </div>

      @if (loading()) {
      <div class="text-center">
        <span class="loader"></span>
      </div>
      }


      <div class="ag-container rounded-3 border shadow-sm overflow-hidden" style="height: 600px;">
        <ag-grid-angular [class]="themeClass + ' w-100 h-100'" [gridOptions]="gridOptions" [columnDefs]="column_name_1"
          (firstDataRendered)="onFirstDataRendered($event)" [rowData]="records()" (gridReady)="onGridReady($event, 1)"
          (stateChanged)="onGridStateChanged()" (filterChanged)="onGridStateChanged()"
          (sortChanged)="onGridStateChanged()" (columnMoved)="onGridStateChanged()">
        </ag-grid-angular>
      </div>



    </div>
  </div>
</div>
