<div class="card p-3 mb-3 shadow-sm">

  <!--    Header -->
  <div class="card-header d-flex justify-content-between align-items-center bg-body-secondary rounded">
    <h5 class="card-title mb-0">{{Title()}}</h5>

    <div class="d-flex align-items-center gap-2">
      <!-- 🔁 دکمه بروزرسانی -->
      <button class="btn btn-sm theme-btn-refresh" (click)="Getdata()" [attr.title]="'بروزرسانی داده‌ها'">
        <i class="fas fa-sync-alt fa-spin-hover"></i>
      </button>
    </div>
  </div>

  <!--   Body -->
  <div class="card-body">


    @if(KowsarReports_data().length>0){


    @if(CentralRef==="0"){
    <app-kowsar-chart-column [title]="" [series]="columnChartData()"
      [categories]="columnChartCategories()"></app-kowsar-chart-column>
    }@else{
    <app-kowsar-chart-pie [title]="" [Array_Number]="ChartData_Array_Number()"
      [Array_Title]="ChartData_Array_Title()"></app-kowsar-chart-pie>
    }

    }
  </div>
</div>
