<!-- 📘 Leave Grid View Template -->
<!-- توضیحات کلی:
     این بخش برای نمایش وضعیت گرید مرخصی کارشناسان طراحی شده است.
     شامل سه حالت مختلف است:
     1️⃣ حالت در حال بارگذاری
     2️⃣ حالت بدون داده
     3️⃣ حالت نمایش گرید داده‌ها -->
<!-- =============================================================== -->

<!-- =============================================================== -->
<!-- 🌀 حالت در حال بارگذاری -->
<!-- =============================================================== -->

@if (records().length > 0) {

<div class="card shadow-sm border-0">

  <!-- Header -->
  <div class="card-header bg-white fw-bold text-primary">
    لیست مرخصی کارشناسان
  </div>

  <!-- Grid Container -->
  <div class="ag-container rounded-3 border shadow-sm overflow-hidden"
    style="height: 200px; border-radius: 0 0 8px 8px; overflow: hidden;">
    <ag-grid-angular [enableBrowserTooltips]="true" [tooltipShowDelay]="200" [tooltipHideDelay]="800"
      [columnDefs]="column_name_1" [rowData]="records()" (gridReady)="onGridReady($event, 1)"
      [gridOptions]="gridOptions" [class]="themeClass + ' w-100 h-100'"
      (firstDataRendered)="gridApi1?.sizeColumnsToFit()" [pagination]="false" [defaultColDef]="defaultColDef"
      [enableBrowserTooltips]="true" [tooltipShowDelay]="200" [tooltipHideDelay]="800"
      (cellClicked)="onCellClicked($event)">
    </ag-grid-angular>
  </div>

</div>

}
