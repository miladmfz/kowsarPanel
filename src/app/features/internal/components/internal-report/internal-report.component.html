<div class="card shadow-sm">
  <div class="card-body pb-0">

    <!-- Tabs -->
    <ul class="nav nav-pills navtab-bg nav-justified">

      @for (tab of tabs; track tab.id) {
      <li class="nav-item">
        <a class="nav-link" [class.active]="activeTab === tab.id" (click)="activeTab = tab.id">
          {{ tab.title }}
        </a>
      </li>
      }

    </ul>

  </div>

  <!-- Tabs Content -->
  <div class="card-body">

    @switch (activeTab) {

    @case ('application') {
    <app-internal-report-application></app-internal-report-application>
    }

    @case ('customer') {
    <app-internal-report-customer></app-internal-report-customer>
    }

    }

  </div>
</div>
