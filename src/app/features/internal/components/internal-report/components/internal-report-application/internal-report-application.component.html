<div class="col-sm-12">

  <form [formGroup]="EditForm_AppLog" (ngSubmit)="getList()" id="submitForm">
    <div class="row">
      <div class="col-12">
        <div class="card">
          <div class="card-body row">

            <div class="form-group col-md-3">
              <label for="ServerName" class="col-form-label"> جستجو </label>
              <input type="text" class="form-control" id="ServerName" formControlName="ServerName" maxlength="100" />
            </div>

            <div class="form-group col-md-5">
              <label for="Flag" class="col-form-label">نوع گزارش </label>
              <label for="Flag" class="col-form-label" style="color: #767de0;"> (انتخابی) </label>
              <span class="text-danger">*</span>

              <select formControlName="Flag" id="Flag" class="form-control custom-select" [ngClass]="{
                        'is-invalid': EditForm_AppLog.controls['Flag'].invalid && EditForm_AppLog.controls['Flag'].touched,
                        'is-valid': EditForm_AppLog.controls['Flag'].valid && EditForm_AppLog.controls['Flag'].touched
                      }">

                <option value="">لطفاً انتخاب کنید</option>

                @for (item of Title_Lookup; track item) {
                <option [value]="item.id">{{ item.name }}</option>
                }
              </select>

              <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                              validation: 'required',
                              message: 'اجباری است',
                              control: EditForm_AppLog.controls['Flag']
                            }">
              </ng-container>
            </div>

            <!-- Date Picker -->
            <div class="form-group col-md-2">
              <label for="FromDate" class="col-form-label">از تاریخ</label>
              <div>
                <ng-persian-datepicker [uiTheme]="customTheme" [uiHideOnOutsideClick]="false"
                  [uiHideAfterSelectDate]="true">
                  <input class="form-control" id="FromDate" type="text" formControlName="FromDate" />
                </ng-persian-datepicker>
              </div>
            </div>

            <div class="form-group col-md-2">
              <label for="ToDate" class="col-form-label">تا تاریخ</label>
              <div>
                <ng-persian-datepicker [uiTheme]="customTheme" [uiHideOnOutsideClick]="false"
                  [uiHideAfterSelectDate]="true">
                  <input class="form-control" id="ToDate" type="text" formControlName="ToDate" />
                </ng-persian-datepicker>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </form>

  <div class="card">
    <div class="card-body">
      <div class="col-sm-6">
        <a href="javascript:void(0)" class="btn btn-success waves-effect waves-light m-2" (click)="getList()">
          <span class="btn-label"><i class="fas fa-check-double"></i></span>
          جستجو
        </a>
      </div>
    </div>
  </div>

</div>

<!-- گرید -->
<div class="ag-container rounded-3 border shadow-sm overflow-hidden" style="height: 600px;">
  <ag-grid-angular [enableBrowserTooltips]="true" [tooltipShowDelay]="200" [tooltipHideDelay]="800"
    [columnDefs]="column_name_1" [rowData]="records()" [gridOptions]="gridOptions" (gridReady)="onGridReady($event, 1)"
    (firstDataRendered)="gridApi1?.sizeColumnsToFit()" [class]="themeClass + ' w-100 h-100'">
  </ag-grid-angular>
</div>


<ng-template #formError let-control="control" let-message="message" let-validation="validation">
  @if (control.hasError(validation) && (control.dirty || control.touched)) {
  <div class="fv-plugins-message-container invalid-feedback">
    <span role="alert">
      {{ message }}
    </span>
  </div>
  }
</ng-template>
