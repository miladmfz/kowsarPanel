<!--   کارت اصلی لیست نامه‌ها -->
<div class="card">
  <div class="card-body">
    <h4 class="card-title mb-3">{{ title }}</h4>

    <!--   فرم جستجو و فیلتر -->
    <form [formGroup]="EditForm_autletter" class="row mb-4 align-items-end">
      <!-- جستجو -->
      <div class="col-md-3">
        <label class="form-label">جستجو</label>
        <input type="text" class="form-control" formControlName="SearchTarget" placeholder="عبارت مورد نظر..."
          (input)="loadList()" />
      </div>

      <!-- نمایش تیکت‌ها -->
      <div class="col-md-3">
        <label class="form-label">نمایش تیکت‌ها</label>
        <select class="form-select" formControlName="SelectedOption">
          <option value="0">همه</option>
          <option value="1">خودم</option>
        </select>
      </div>

      <!-- از تاریخ -->
      <div class="col-md-3">
        <label class="form-label">از تاریخ</label>
        <ng-persian-datepicker [uiTheme]="customTheme" [uiHideOnOutsideClick]="true" [uiHideAfterSelectDate]="true">
          <input type="text" class="form-control text-center" formControlName="StartTime" placeholder="انتخاب تاریخ"
            autocomplete="off" />
        </ng-persian-datepicker>
      </div>

      <!-- تا تاریخ -->
      <div class="col-md-3">
        <label class="form-label">تا تاریخ</label>
        <ng-persian-datepicker [uiTheme]="customTheme" [uiHideOnOutsideClick]="true" [uiHideAfterSelectDate]="true">
          <input type="text" class="form-control text-center" formControlName="EndTime" placeholder="انتخاب تاریخ"
            autocomplete="off" />
        </ng-persian-datepicker>
      </div>

      <!--   دکمه‌ها -->
      <div class="col-12 d-flex justify-content-end mt-3 gap-2">
        <button type="button" class="btn btn-primary" (click)="loadList()">
          <i class="fas fa-search me-1"></i> جستجو
        </button>

        <a class="btn btn-success" [routerLink]="['/support/letter-insert']">
          <i class="fas fa-plus me-1"></i> جدید
        </a>

        <button type="button" class="btn btn-light" (click)="loadList()">
          <i class="fas fa-sync me-1"></i> بازخوانی
        </button>

        <button type="button" class="btn btn-outline-secondary" (click)="clearFilter()">
          <i class="fas fa-eye-slash me-1"></i> حذف جستجو
        </button>
      </div>
    </form>

    <!--   جدول اصلی -->
    <div class="ag-container rounded-3 overflow-hidden" style="height: 600px;">
      <ag-grid-angular [columnDefs]="columnDefs1" [rowData]="records" [gridOptions]="gridOptions"
        (gridReady)="onGridReady($event, 1)" (firstDataRendered)="gridApi1?.sizeColumnsToFit()"
        class="w-100 h-100"></ag-grid-angular>
    </div>
  </div>
</div>

<!--   Modal جزئیات نامه -->
<div #autletterDetail class="modal fade" id="autletterdetail" tabindex="-1" aria-labelledby="autletterdetailLabel"
  aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content bg-light">
      <div class="modal-header bg-secondary text-white">
        <h5 class="modal-title" id="autletterdetailLabel">
          شرح وضعیت و کار
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"
          (click)="closeModal()"></button>
      </div>

      <div class="modal-body">
        <form [formGroup]="EditForm_autletter_detail" id="submitForm">
          <div class="card">
            <div class="card-body row g-3">
              <div class="col-md-6" *ngFor="let field of [
                  'LetterCode',
                  'LetterDate',
                  'LetterPriority',
                  'LetterReceiveType',
                  'LetterState',
                  'LetterTitle',
                  'CreatorName',
                  'ExecutorName',
                  'OwnerName',
                  'RowExecutorName',
                  'RowLetterDate',
                  'RowLetterState',
                  'AutLetterRow_PropDescription1',
                  'RowsCount'
                ]">
                <label [for]="field" class="form-label">
                  {{
                  field === 'LetterCode' ? 'کد نامه' :
                  field === 'LetterDate' ? 'تاریخ نامه' :
                  field === 'LetterPriority' ? 'اولویت نامه' :
                  field === 'LetterReceiveType' ? 'نوع دریافت نامه' :
                  field === 'LetterState' ? 'وضعیت نامه' :
                  field === 'LetterTitle' ? 'عنوان نامه' :
                  field === 'CreatorName' ? 'ایجادکننده' :
                  field === 'ExecutorName' ? 'مجری' :
                  field === 'OwnerName' ? 'مالک' :
                  field === 'RowExecutorName' ? 'مجری ردیف' :
                  field === 'RowLetterDate' ? 'تاریخ ردیف نامه' :
                  field === 'RowLetterState' ? 'وضعیت ردیف نامه' :
                  field === 'AutLetterRow_PropDescription1' ? 'توضیحات اضافی' :
                  field === 'RowsCount' ? 'تعداد ردیف‌ها' :
                  field
                  }}
                </label>
                <input [formControlName]="field" [id]="field" class="form-control" autocomplete="off" readonly />
              </div>
            </div>
          </div>
        </form>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="closeModal()">
          بستن
        </button>
      </div>
    </div>
  </div>
</div>
