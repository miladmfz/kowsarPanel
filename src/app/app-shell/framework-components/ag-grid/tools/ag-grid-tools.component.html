<div class="btn-group">
  <button type="button" class="btn btn-outline-secondary waves-effect waves-light m-1 dropdown-toggle"
    data-bs-toggle="dropdown" aria-expanded="false">
    ابزار جدول
    @if (hasSavedState) {
    <span class="text-success">(شخصی‌سازی‌شده)</span>
    }
    <span class="btn-label ms-1"><i class="fas fa-cog"></i></span>
  </button>

  <ul class="dropdown-menu">
    @if (exportPermission) {
    <li>
      <button class="dropdown-item" type="button" (click)="onExportExcel()">
        <i class="fas fa-file-excel text-success me-1"></i> خروجی Excel
      </button>
    </li>
    <li>
      <button class="dropdown-item" type="button" (click)="onExportCSV()">
        <i class="fas fa-file-csv text-info me-1"></i> خروجی CSV
      </button>
    </li>
    <li>
      <hr class="dropdown-divider" />
    </li>
    }

    <li>
      <button class="dropdown-item" type="button" (click)="saveState()">
        <i class="fas fa-save text-warning me-1"></i> ذخیره حالت جدول
      </button>
    </li>
    <li>
      <button class="dropdown-item" type="button" (click)="resetState()">
        <i class="fas fa-redo text-danger me-1"></i> بازگردانی به حالت پیش‌فرض
      </button>
    </li>
  </ul>
</div>
