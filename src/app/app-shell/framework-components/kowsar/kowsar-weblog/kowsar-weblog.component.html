<div class="card">
  <div class="card-body">
    <h4 class="card-title">{{ title }}</h4>
    <div class="row mb-2">
      <div class="col-sm-12">
        <div class="row mb-2">
          <div class="col-sm-12">
            <a type="button" class="btn btn-light waves-effect waves-light m-1" (click)="getList()">
              <span class="btn-label"><i class="fas fa-recycle"></i></span>بازخوانی
            </a>

          </div>
        </div>
      </div>
    </div>

    <div class="ag-container rounded-3 overflow-hidden" style="height: 600px;">
      <ag-grid-angular [columnDefs]="columnDefs1" [rowData]="records" [gridOptions]="gridOptions"
        (gridReady)="onGridReady($event, 1)" (firstDataRendered)="gridApi1?.sizeColumnsToFit()" class="w-100 h-100">
      </ag-grid-angular>
    </div>
  </div>
</div>
