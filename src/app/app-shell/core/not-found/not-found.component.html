<!-- 🚫 صفحه خطای 404 (Page Not Found) -->
<!-- توضیحات کلی:
     این صفحه زمانی نمایش داده می‌شود که کاربر به مسیر نامعتبری در سیستم هدایت شود.
     طراحی ساده و واکنش‌گرا با پیام خطا، توضیح کوتاه و دکمه بازگشت به صفحه اصلی.
-->
<!-- =============================================================== -->

<div class="d-flex flex-column justify-content-center align-items-center text-center py-5" dir="rtl">
  <!--   آیکون هشدار -->
  <i class="fas fa-exclamation-triangle text-warning fa-4x mb-3"></i>

  <!-- 🔢 کد خطا -->
  <h1 class="display-1 text-danger fw-bold mb-2">404</h1>

  <!--   توضیحات -->
  <h3 class="fw-semibold mb-2">صفحه مورد نظر یافت نشد</h3>
  <p class="text-muted mb-4">
    ممکن است آدرس را اشتباه وارد کرده باشید یا صفحه حذف شده باشد.
  </p>

  <!-- 🏠 دکمه بازگشت به خانه -->
  <button type="button" class="btn btn-primary px-4" (click)="goHome()">
    <i class="fas fa-home me-2"></i>
    بازگشت به صفحه اصلی
  </button>
</div>
