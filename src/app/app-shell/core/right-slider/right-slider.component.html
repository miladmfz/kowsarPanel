<!-- Right Sidebar -->
<div class="right-bar">
  <div class="rightbar-title">
    <a href="javascript:void(0);" class="right-bar-toggle float-end">
      <i class="fe-x noti-icon"></i>
    </a>
    <h5 class="m-0 text-primary">تنظیمات ظاهر</h5>
  </div>

  <div class="rightbar-content px-3">
    <div class="mt-3">
      <h6 class="text-muted">حالت نمایش</h6>

      <div class="form-check form-switch mb-2">
        <input type="checkbox" class="form-check-input" id="theme-dark" (change)="toggleDarkMode($event)" />
        <label class="form-check-label" for="theme-dark">حالت شب</label>
      </div>

      <div class="form-check form-switch">
        <input type="checkbox" class="form-check-input" id="compact-sidebar" (change)="toggleSidebarCompact($event)" />
        <label class="form-check-label" for="compact-sidebar">سایدبار فشرده</label>
      </div>
    </div>
  </div>
</div>

<div class="rightbar-overlay"></div>
