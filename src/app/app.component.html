@if (loadingService.loading()) {

<div class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center" style="
        z-index: 99999;
        background: rgba(15, 23, 42, .38);
    " dir="rtl">

    <div class="text-center bg-white shadow-lg" style="
            width: 320px;
            border-radius: 16px;
            border: 1px solid rgba(13, 71, 161, .12);
            overflow: hidden;
        ">

        <div style="
                height: 4px;
                background: linear-gradient(90deg, #0d47a1, #1976d2, #ffcc33);
            ">
        </div>

        <div class="py-4 px-3">

            <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="
                    width: 58px;
                    height: 58px;
                    background: rgba(13, 71, 161, .08);
                    border: 1px solid rgba(13, 71, 161, .14);
                ">

                <i class="fas fa-spinner fa-spin" style="
                        font-size: 24px;
                        color: #0d47a1;
                    ">
                </i>

            </div>

            <div class="fw-semibold mb-1" style="
                    color: #0f2748;
                    font-size: 17px;
                ">

                لطفاً منتظر بمانید...

            </div>

            <div style="
                    color: #6c757d;
                    font-size: 13px;
                ">

                در حال پردازش اطلاعات

            </div>

        </div>

    </div>

</div>

}
